<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>מסלולי חלוקה — עומר 🐾</title>
<meta name="description" content="מסלולי חלוקה יומיים לנהג למוצרי כלבים, עם קישורי Waze לכל סניף" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐾</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <span class="brand-mark">PAW&#8209;01</span>
      <div>
        <div class="brand-title">
          <svg class="paw-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <ellipse cx="12" cy="15.2" rx="5.4" ry="4.6"/>
            <ellipse cx="5.4" cy="9.6" rx="2.15" ry="2.7" transform="rotate(-18 5.4 9.6)"/>
            <ellipse cx="10.1" cy="5.6" rx="2.05" ry="2.6" transform="rotate(-6 10.1 5.6)"/>
            <ellipse cx="14.9" cy="5.4" rx="2.05" ry="2.6" transform="rotate(6 14.9 5.4)"/>
            <ellipse cx="19.1" cy="9.2" rx="2.15" ry="2.7" transform="rotate(18 19.1 9.2)"/>
          </svg>
          מסלולי חלוקה
        </div>
        <div class="brand-sub">DOG SUPPLY ROUTES · DAROM</div>
      </div>
    </div>
    <div class="topbar-actions">
      <button class="settings-toggle" id="settingsToggle" title="הגדרות מסלול" aria-label="הגדרות מסלול">⚙</button>
      <button class="theme-toggle" id="themeToggle" title="החלף מצב תצוגה" aria-label="החלף מצב תצוגה">◐</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" data-view="route">מסלול יומי</button>
    <button class="tab-btn" data-view="all">כל הסניפים</button>
  </div>
</div>

<div class="modal-backdrop" id="settingsBackdrop">
  <div class="modal-panel">
    <div class="modal-header">
      <h2>🐾 הגדרות מסלול</h2>
      <button class="modal-close" id="settingsClose" aria-label="סגור">✕</button>
    </div>
    <p class="modal-hint">
      קבע אילוצים לחלוקת הסניפים לימים — המערכת תחשב מחדש את הפיצול והמסלול בהתאם, כולל יציאה וחזרה
      מהבסיס בכל יום. השארת שדה ריק = ללא הגבלה.
    </p>
    <div class="modal-form">
      <label class="field">
        <span>מספר ימים (ריק = אוטומטי, המערכת תבחר את המספר היעיל ביותר)</span>
        <input type="number" id="cfgNumDays" min="1" step="1" placeholder="אוטומטי" />
      </label>
      <div class="field-row">
        <label class="field">
          <span>מינימום עצירות ליום</span>
          <input type="number" id="cfgMinPerDay" min="1" step="1" value="7" />
        </label>
        <label class="field">
          <span>מקסימום עצירות ליום</span>
          <input type="number" id="cfgMaxPerDay" min="1" step="1" value="9" />
        </label>
      </div>
      <label class="field">
        <span>מרחק נסיעה מקסימלי בין שתי עצירות עוקבות (ק"מ, ריק = ללא הגבלה)</span>
        <input type="number" id="cfgMaxLegKm" min="0" step="1" placeholder="ללא הגבלה" />
      </label>
    </div>
    <div class="modal-error" id="settingsError" hidden></div>
    <div class="modal-actions">
      <button class="btn-secondary" id="settingsReset">אפס לברירת מחדל</button>
      <button class="btn-primary" id="settingsApply">חשב מסלול</button>
    </div>
    <p class="modal-note" id="settingsActiveNote" hidden></p>
  </div>
</div>

<main>

  <section class="view active" id="view-route">
    <div class="day-strip" id="dayStrip"></div>
    <div id="dayHeader"></div>
    <div class="map-frame" id="mapFrame">
      <div id="dayMap"></div>
    </div>
    <div class="route-line" id="routeLine"></div>
    <div id="unscheduledBox"></div>
  </section>

  <section class="view" id="view-all">
    <div class="search-row">
      <input class="search-input" id="searchInput" type="text" placeholder="חיפוש סניף, עיר או רשת…" />
    </div>
    <div class="branch-count" id="branchCount"></div>
    <div id="branchList"></div>
  </section>

</main>

<footer>נוצר אוטומטית ממסד הנתונים · לעדכון המסלול הרץ מחדש את הסקריפטים בפרויקט</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="data.js"></script>
<script src="planner.js"></script>
<script src="app.js"></script>
</body>
</html>
